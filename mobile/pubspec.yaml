name: p2p_delivery_mobile
description: P2P traveler delivery app
publish_to: none
version: 0.1.2+3

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  country_picker: ^2.0.27
  file_picker: ^8.1.2
  http: ^1.2.2
  google_sign_in: ^6.3.0
  image_picker: ^1.2.0
  shared_preferences: ^2.3.3
  sign_in_with_apple: ^6.1.3
  flutter_pdfview: ^1.4.1+1
  flutter_file_dialog: ^3.0.2
  google_fonts: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true 
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#10231C"
  adaptive_icon_foreground: assets/branding/app_icon.png
