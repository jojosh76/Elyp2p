version: "3.9"
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: p2p_delivery
    volumes:
      - p2p_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d p2p_delivery"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../backend/.env.production
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/p2p_delivery?sslmode=disable
    ports:
      - "8080:8080"
    volumes:
      - p2p_uploads:/app/data/uploads

volumes:
  p2p_pgdata:
  p2p_uploads:
